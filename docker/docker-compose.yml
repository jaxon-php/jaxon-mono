services:

  jaxon-php82:
    container_name: php82
    build:
      context: ./
      dockerfile: php82/Dockerfile
      args:
        - PHP_USER=jaxon
        - PHP_UID=${PHP_UID:-1000}
        - PHP_GID=${PHP_GID:-1000}
    volumes:
     - ../..:/var/www

  website:
    container_name: website
    build:
      context: ./
      dockerfile: website/Dockerfile
      args:
        - PHP_USER=jaxon
        - PHP_UID=${PHP_UID:-1000}
        - PHP_GID=${PHP_GID:-1000}
    volumes:
     - ../../jaxon-website:/var/www/website
     - ../jaxon-dialogs:/var/www/dialogs
     - ../jaxon-examples:/var/www/examples
     - ../vendor:/var/www/examples/vendor
    ports:
      - 5000:80
    networks:
      - jaxon-apps

  examples:
    container_name: examples
    build:
      context: ./
      dockerfile: examples/Dockerfile
      args:
        - PHP_USER=jaxon
        - PHP_UID=${PHP_UID:-1000}
        - PHP_GID=${PHP_GID:-1000}
    volumes:
     - ..:/var/www
    ports:
      - 5001:80
    networks:
      - jaxon-apps

  demo-laravel:
    container_name: demo-laravel
    build:
      context: ./
      dockerfile: demo/Dockerfile
      args:
        - PHP_USER=jaxon
        - PHP_UID=${PHP_UID:-1000}
        - PHP_GID=${PHP_GID:-1000}
    volumes:
     - ../../jaxon-demo-laravel:/var/www
    ports:
      - 5002:80
    networks:
      - jaxon-apps

  demo-symfony:
    container_name: demo-symfony
    build:
      context: ./
      dockerfile: demo/Dockerfile
      args:
        - PHP_USER=jaxon
        - PHP_UID=${PHP_UID:-1000}
        - PHP_GID=${PHP_GID:-1000}
    volumes:
     - ../../jaxon-demo-symfony:/var/www
    ports:
      - 5003:80
    networks:
      - jaxon-apps

  demo-slim:
    container_name: demo-slim
    build:
      context: ./
      dockerfile: demo/Dockerfile
      args:
        - PHP_USER=jaxon
        - PHP_UID=${PHP_UID:-1000}
        - PHP_GID=${PHP_GID:-1000}
    volumes:
     - ../../jaxon-demo-slim:/var/www
    ports:
      - 5004:80
    networks:
      - jaxon-apps

